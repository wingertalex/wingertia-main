<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WingertIA</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; font-src 'https://fonts.gstatic.com';">
    
    <style>
        :root {
            --glow-color: #00f2fe;
            --bg-dark: #050811;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Estético: impede scroll de barras laterais indesejadas */
            position: relative;
            cursor: default;
        }

        /* Canvas para a animação interativa com o mouse */
        #interactive-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            z-index: 1;
            position: relative;
            text-align: center;
            user-select: none;
        }

        /* Fonte Moderna, Minimalista e Futurista */
        h1 {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -1px; /* Estilo moderno de tracking mais junto */
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6), 0 0 30px rgba(0, 242, 254, 0.2);
            animation: pulseGlow 4s ease-in-out infinite alternate;
            display: inline-block;
        }

        /* O Cursor Piscando Clássico de Terminal/Tech */
        h1::after {
            content: '_';
            color: var(--glow-color);
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
            text-shadow: 0 0 10px var(--glow-color);
        }

        @keyframes blink {
            from, to { color: transparent }
            50% { color: var(--glow-color); }
        }

        @keyframes pulseGlow {
            0% {
                text-shadow: 0 0 15px rgba(0, 242, 254, 0.5), 0 0 30px rgba(0, 242, 254, 0.1);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 25px rgba(0, 242, 254, 0.8), 0 0 40px rgba(0, 242, 254, 0.4);
                transform: scale(1.01);
            }
        }

        @media (max-width: 600px) {
            h1 { font-size: 3rem; letter-spacing: -0.5px; }
        }
    </style>
</head>
<body>

    <canvas id="interactive-canvas"></canvas>

    <div class="content" role="main" aria-label="Portal de apresentação WingertIA">
        <h1>WingertIA</h1>
    </div>

    <script>
        const canvas = document.getElementById('interactive-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const maxDistance = 100; // Limite de distância para conexão

        // Coordenadas do mouse
        const mouse = {
            x: null,
            y: null,
            radius: 150 // Raio de atração/interação do mouse
        }

        // Atualiza a posição do mouse na tela
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        // Limpa a posição do mouse quando ele sai da tela
        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        // Robustez: Implementação de Debounce no resize para evitar flickers e gargalos
        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 200);
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }

        // Classe das partículas flutuantes
        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            // Desenha a partícula individual
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            // Atualiza posição e checa proximidade do mouse
            update() {
                // Movimento padrão
                this.x += this.directionX;
                this.y += this.directionY;

                // Rebater nas bordas da tela
                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                // Interação de atração suave se o mouse estiver na tela
                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    
                    // Pre-check para o raio do mouse antes do cálculo de hipotenusa
                    if (Math.abs(dx) < mouse.radius && Math.abs(dy) < mouse.radius) {
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            this.x += dx * 0.03;
                            this.y += dy * 0.03;
                        }
                    }
                }
                this.draw();
            }
        }

        // Inicializa a malha de partículas
        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            numberOfParticles = Math.min(numberOfParticles, 120); // Limite físico para memória

            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((window.innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((window.innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5;
                let directionY = (Math.random() * 1) - 0.5;
                let color = 'rgba(0, 242, 254, 0.4)';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Cria as linhas de conexão entre partículas com otimização O(n²) reduzida por pre-check
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;

                    // Performance: Pre-check matemático barato evita o Math.sqrt em loops intensivos
                    if (Math.abs(dx) > maxDistance || Math.abs(dy) > maxDistance) continue;

                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // Cria linhas entre partículas próximas
                    if (distance < maxDistance) {
                        opacityValue = 1 - (distance / maxDistance);
                        ctx.strokeStyle = 'rgba(0, 242, 254, ' + opacityValue * 0.15 + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }

                // Linhas conectando as partículas diretamente ao mouse (também otimizado com pre-check)
                if (mouse.x !== null && mouse.y !== null) {
                    let dxMouse = mouse.x - particlesArray[a].x;
                    let dyMouse = mouse.y - particlesArray[a].y;

                    if (Math.abs(dxMouse) < mouse.radius && Math.abs(dyMouse) < mouse.radius) {
                        let distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

                        if (distMouse < mouse.radius) {
                            opacityValue = 1 - (distMouse / mouse.radius);
                            ctx.strokeStyle = 'rgba(0, 242, 254, ' + opacityValue * 0.3 + ')';
                            ctx.lineWidth = 1.2;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        // Loop de animação nativo via requestAnimationFrame
        function animate() {
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
            requestAnimationFrame(animate);
        }

        // Inicialização primária
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
        animate();
    </script>
</body>
</html>
