<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WingertIA</title>
    
    <!-- Ajustado o Content-Security-Policy para permitir conexão externa com o Hugging Face (connect-src) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; font-src 'https://fonts.gstatic.com'; connect-src https://alexwingert-minha-ia-api.hf.space;">
    
    <style>
        :root {
            --glow-color: #00f2fe;
            --bg-dark: #050811;
            --chat-bg: rgba(10, 16, 32, 0.75);
            --chat-border: rgba(0, 242, 254, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Estético: impede scroll de barras laterais indesejadas */
            position: relative;
            cursor: default;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Canvas para a animação interativa com o mouse */
        #interactive-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            z-index: 1;
            position: relative;
            text-align: center;
            width: 100%;
            max-width: 650px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* Fonte Moderna, Minimalista e Futurista */
        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1px; /* Estilo moderno de tracking mais junto */
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6), 0 0 30px rgba(0, 242, 254, 0.2);
            animation: pulseGlow 4s ease-in-out infinite alternate;
            display: inline-block;
            user-select: none;
        }

        /* O Cursor Piscando Clássico de Terminal/Tech */
        h1::after {
            content: '_';
            color: var(--glow-color);
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
            text-shadow: 0 0 10px var(--glow-color);
        }

        /* --- Custom UI do Chat WingertIA --- */
        .chat-wrapper {
            width: 100%;
            background: var(--chat-bg);
            border: 1px solid var(--chat-border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-align: left;
        }

        #historico-chat {
            height: 280px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        #historico-chat p {
            color: #e0e6ed;
            margin-bottom: 12px;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        #historico-chat strong {
            color: var(--glow-color);
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.4);
        }

        #historico-chat em {
            color: #8892b0;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
        }

        #pergunta-usuario {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 6px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        #pergunta-usuario:focus {
            border-color: var(--glow-color);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        #btn-enviar {
            background: transparent;
            border: 1px solid var(--glow-color);
            color: #fff;
            padding: 0 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-shadow: 0 0 5px var(--glow-color);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.1);
        }

        #btn-enviar:hover {
            background: var(--glow-color);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--glow-color);
            text-shadow: none;
        }

        /* Custom Scrollbar para combinar com o tema */
        #historico-chat::-webkit-scrollbar {
            width: 4px;
        }
        #historico-chat::-webkit-scrollbar-track {
            background: transparent;
        }
        #historico-chat::-webkit-scrollbar-thumb {
            background: var(--chat-border);
            border-radius: 10px;
        }

        @keyframes blink {
            from, to { color: transparent }
            50% { color: var(--glow-color); }
        }

        @keyframes pulseGlow {
            0% {
                text-shadow: 0 0 15px rgba(0, 242, 254, 0.5), 0 0 30px rgba(0, 242, 254, 0.1);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 25px rgba(0, 242, 254, 0.8), 0 0 40px rgba(0, 242, 254, 0.4);
                transform: scale(1.01);
            }
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.8rem; letter-spacing: -0.5px; }
            .content { padding: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="interactive-canvas"></canvas>

    <div class="content" role="main" aria-label="Portal de apresentação WingertIA">
        <h1>WingertIA</h1>

        <!-- Interface de Conversa Integrada -->
        <div class="chat-wrapper">
            <div id="historico-chat">
                <p><strong>Sua IA:</strong> Conexão estabelecida. Como posso te ajudar hoje?</p>
            </div>
            <div class="chat-input-area">
                <input type="text" id="pergunta-usuario" placeholder="Digite sua instrução ou pergunta..." autocomplete="off">
                <button id="btn-enviar" onclick="enviarParaIA()">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // --- Script do Chat integrado com o Hugging Face Space ---
        async function enviarParaIA() {
            const inputUsuario = document.getElementById("pergunta-usuario");
            const historicoChat = document.getElementById("historico-chat");
            const pergunta = inputUsuario.value.trim();

            if (!pergunta) return;

            // Insere input do usuário na tela
            historicoChat.innerHTML += `<p><strong>Você:</strong> ${pergunta}</p>`;
            inputUsuario.value = ""; 
            historicoChat.scrollTop = historicoChat.scrollHeight; 

            // Estado visual de processamento
            const IDMensagemPensando = "pensando-" + Date.now();
            historicoChat.innerHTML += `<p id="${IDMensagemPensando}"><em>Buscando resposta...</em></p>`;
            historicoChat.scrollTop = historicoChat.scrollHeight;

            const urlAPI = "https://alexwingert-minha-ia-api.hf.space/pergunta"; 

            try {
                const response = await fetch(urlAPI, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ prompt: pergunta })
                });

                const resultado = await response.json();
                
                document.getElementById(IDMensagemPensando).remove();

                if (resultado.resposta) {
                    historicoChat.innerHTML += `<p><strong>Sua IA:</strong> ${resultado.resposta}</p>`;
                } else if (resultado.erro) {
                    historicoChat.innerHTML += `<p style="color: #ff4a4a;"><strong>Erro interno:</strong> ${resultado.erro}</p>`;
                }
                
            } catch (error) {
                console.error("Erro na requisição à API:", error);
                const elementoPensando = document.getElementById(IDMensagemPensando);
                if (elementoPensando) elementoPensando.remove();
                historicoChat.innerHTML += `<p style="color: #ff4a4a;"><strong>Erro de Rede:</strong> Não foi possível obter resposta do servidor da IA.</p>`;
            }

            historicoChat.scrollTop = historicoChat.scrollHeight; 
        }

        // Listener para disparar o envio ao pressionar a tecla Enter
        document.getElementById("pergunta-usuario").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                enviarParaIA();
            }
        });

        // --- Animação do Canvas Interativo (Preservado o código original) ---
        const canvas = document.getElementById('interactive-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const maxDistance = 100; 

        const mouse = {
            x: null,
            y: null,
            radius: 150 
        }

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 200);
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                this.x += this.directionX;
                this.y += this.directionY;

                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    
                    if (Math.abs(dx) < mouse.radius && Math.abs(dy) < mouse.radius) {
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            this.x += dx * 0.03;
                            this.y += dy * 0.03;
                        }
                    }
                }
                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            numberOfParticles = Math.min(numberOfParticles, 120); 

            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((window.innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((window.innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 1) - 0.5;
                let directionY = (Math.random() * 1) - 0.5;
                let color = 'rgba(0, 242, 254, 0.4)';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;

                    if (Math.abs(dx) > maxDistance || Math.abs(dy) > maxDistance) continue;

                    let distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        opacityValue = 1 - (distance / maxDistance);
                        ctx.strokeStyle = 'rgba(0, 242, 254, ' + opacityValue * 0.15 + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x !== null && mouse.y !== null) {
                    let dxMouse = mouse.x - particlesArray[a].x;
                    let dyMouse = mouse.y - particlesArray[a].y;

                    if (Math.abs(dxMouse) < mouse.radius && Math.abs(dyMouse) < mouse.radius) {
                        let distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

                        if (distMouse < mouse.radius) {
                            opacityValue = 1 - (distMouse / mouse.radius);
                            ctx.strokeStyle = 'rgba(0, 242, 254, ' + opacityValue * 0.3 + ')';
                            ctx.lineWidth = 1.2;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
            requestAnimationFrame(animate);
        }

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        init();
        animate();
    </script>
</body>
</html>
