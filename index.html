<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WingertIA — tecnologia, automação e inteligência artificial.">
    <title>WingertIA</title>

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' https://hits.sh data:;">

    <style>
        :root {
            --glow-color: #00f2fe;
            --bg-dark: #050811;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: default;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #interactive-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content {
            z-index: 1;
            position: relative;
            text-align: center;
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6), 0 0 30px rgba(0, 242, 254, 0.2);
            animation: pulseGlow 4s ease-in-out infinite alternate;
            display: inline-block;
            user-select: none;
        }

        h1::after {
            content: '_';
            color: var(--glow-color);
            margin-left: 5px;
            animation: blink 0.8s step-end infinite;
            text-shadow: 0 0 10px var(--glow-color);
        }

        .visit-counter {
            position: fixed;
            right: 14px;
            bottom: 10px;
            z-index: 2;
            opacity: 0.32;
            transition: opacity 0.25s ease;
            line-height: 0;
        }

        .visit-counter:hover {
            opacity: 0.65;
        }

        .visit-counter img {
            height: 18px;
            width: auto;
            filter: grayscale(1);
        }

        @keyframes blink {
            from, to { color: transparent; }
            50% { color: var(--glow-color); }
        }

        @keyframes pulseGlow {
            0% {
                text-shadow: 0 0 15px rgba(0, 242, 254, 0.5), 0 0 30px rgba(0, 242, 254, 0.1);
                transform: scale(1);
            }
            100% {
                text-shadow: 0 0 25px rgba(0, 242, 254, 0.8), 0 0 40px rgba(0, 242, 254, 0.4);
                transform: scale(1.01);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.8rem;
                letter-spacing: -0.5px;
            }

            .content {
                padding: 10px;
            }

            .visit-counter {
                right: 8px;
                bottom: 7px;
            }
        }
    </style>
</head>
<body>
    <canvas id="interactive-canvas"></canvas>

    <main class="content" aria-label="Portal de apresentação WingertIA">
        <h1>WingertIA</h1>
    </main>

    <div class="visit-counter" aria-label="Contador de visitas" title="Visitas">
        <img src="https://hits.sh/wingertia.com.br.svg?style=flat&label=visitas&color=111827&labelColor=111827" alt="Contador de visitas">
    </div>

    <script>
        const canvas = document.getElementById('interactive-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const maxDistance = 100;

        const mouse = {
            x: null,
            y: null,
            radius: 150
        };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = null;
            mouse.y = null;
        });

        let resizeTimeout;
        window.addEventListener('resize', function() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 200);
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.x += this.directionX;
                this.y += this.directionY;

                if (this.x > canvas.width || this.x < 0) this.directionX = -this.directionX;
                if (this.y > canvas.height || this.y < 0) this.directionY = -this.directionY;

                if (mouse.x !== null && mouse.y !== null) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;

                    if (Math.abs(dx) < mouse.radius && Math.abs(dy) < mouse.radius) {
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        if (distance < mouse.radius) {
                            this.x += dx * 0.03;
                            this.y += dy * 0.03;
                        }
                    }
                }

                this.draw();
            }
        }

        function init() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            numberOfParticles = Math.min(numberOfParticles, 120);

            for (let i = 0; i < numberOfParticles; i++) {
                const size = (Math.random() * 2) + 1;
                const x = Math.random() * (window.innerWidth - size * 4) + size * 2;
                const y = Math.random() * (window.innerHeight - size * 4) + size * 2;
                const directionX = (Math.random() * 1) - 0.5;
                const directionY = (Math.random() * 1) - 0.5;
                const color = 'rgba(0, 242, 254, 0.4)';

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        function connect() {
            let opacityValue = 1;

            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    const dx = particlesArray[a].x - particlesArray[b].x;
                    const dy = particlesArray[a].y - particlesArray[b].y;

                    if (Math.abs(dx) > maxDistance || Math.abs(dy) > maxDistance) continue;

                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        opacityValue = 1 - (distance / maxDistance);
                        ctx.strokeStyle = 'rgba(0, 242, 254, ' + opacityValue * 0.15 + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x !== null && mouse.y !== null) {
                    const dxMouse = mouse.x - particlesArray[a].x;
                    const dyMouse = mouse.y - particlesArray[a].y;

                    if (Math.abs(dxMouse) < mouse.radius && Math.abs(dyMouse) < mouse.radius) {
                        const distMouse = Math.sqrt(dxMouse * dxMouse + dyMouse * dyMouse);

                        if (distMouse < mouse.radius) {
                            opacityValue = 1 - (distMouse / mouse.radius);
                            ctx.strokeStyle = 'rgba(0, 242, 254, ' + opacityValue * 0.3 + ')';
                            ctx.lineWidth = 1.2;
                            ctx.beginPath();
                            ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                            ctx.lineTo(mouse.x, mouse.y);
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }

            connect();
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        animate();
    </script>
</body>
</html>
